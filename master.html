<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Mestre - RPG Platform</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/map.css">
  <style>
    .master-layout {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 1rem;
      min-height: calc(100vh - 80px);
    }

    .sidebar-left, .sidebar-right {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .battle-indicator {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-accent-red);
      color: white;
      padding: 0.5rem 2rem;
      border-radius: var(--radius-md);
      font-weight: bold;
      z-index: 100;
      display: none;
    }

    .battle-indicator.active {
      display: block;
      animation: pulse-red 1s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
      50% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
    }

    .dice-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
    }

    .dice-display {
      font-size: 2rem;
      font-weight: bold;
      min-width: 60px;
      text-align: center;
      color: var(--color-accent-gold);
    }

    .dice-rolling {
      animation: shake 0.1s infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-5deg); }
      75% { transform: translateX(5px) rotate(5deg); }
    }

    .dice-buttons {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .tokens-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      min-height: 60px;
    }

    .npc-template {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-tertiary);
      border-radius: var(--radius-sm);
      cursor: grab;
      font-size: 0.85rem;
      transition: all var(--transition-fast);
    }

    .npc-template:hover {
      background: var(--color-bg-secondary);
      transform: scale(1.05);
    }

    .npc-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .npc-hp {
      color: var(--color-text-muted);
      font-size: 0.75rem;
    }

    .map-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .map-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
    }

    .map-drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .map-wrapper:hover .map-drawing-canvas {
      pointer-events: auto;
    }

    .tokens-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .map-token {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: grab;
      pointer-events: auto;
      transition: transform 0.1s;
      z-index: 10;
    }

    .map-token span {
      font-size: 1.25rem;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .map-token.enemy {
      border-color: #dc2626 !important;
      background-color: rgba(220, 38, 38, 0.3) !important;
    }

    .map-token.npc {
      border-color: #3b82f6 !important;
      background-color: rgba(59, 130, 246, 0.3) !important;
    }

    .map-token.object {
      border-color: #6b7280 !important;
      background-color: rgba(107, 114, 128, 0.3) !important;
    }

    .map-token.player {
      border-color: #d4af37 !important;
      background-color: rgba(212, 175, 55, 0.3) !important;
    }

    .token-name {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      white-space: nowrap;
      background: rgba(0,0,0,0.7);
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
    }

    .map-drop-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-secondary);
      border: 2px dashed rgba(212, 175, 55, 0.3);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .map-drop-zone:hover, .map-drop-zone.drag-over {
      border-color: var(--color-accent-gold);
      background: rgba(212, 175, 55, 0.1);
    }

    .drag-over {
      background: rgba(212, 175, 55, 0.2) !important;
    }

    #mapDropZone { cursor: default; pointer-events: none; }
    #mapDropZone canvas, #mapDropZone .map-token { pointer-events: all; }

    .master-sheet-card {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .master-sheet-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .master-sheet-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-accent-gold);
      color: var(--color-bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .master-sheet-info h4 {
      margin: 0;
      font-size: 0.9rem;
    }

    .master-sheet-info span {
      font-size: 0.75rem;
    }

    .hp-control {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .hp-display {
      flex: 1;
      text-align: center;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .hp-bar {
      height: 6px;
      background: var(--color-bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }

    .hp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #dc2626, #ef4444);
      transition: width 0.3s;
    }

    .turn-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      border: 2px solid var(--color-accent-gold);
      padding: 0.5rem 1.5rem;
      border-radius: var(--radius-md);
      z-index: 99;
      display: none;
    }

    .turn-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .round-badge {
      background: var(--color-accent-gold);
      color: var(--color-bg-primary);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: bold;
      font-size: 0.85rem;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--color-bg-card);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
    }

    .modal-content h3 {
      margin-top: 0;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }

    .form-row {
      display: flex;
      gap: 1rem;
    }

    .form-row .form-group {
      flex: 1;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .status-checkbox {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .status-checkbox:hover {
      background: var(--color-bg-tertiary);
    }

    .battle-mode .chat-container {
      border-color: var(--color-accent-red);
    }

    @media (max-width: 1200px) {
      .master-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="page battle-mode">
  <div class="turn-indicator" id="turnIndicator"></div>
  <div class="battle-indicator" id="battleIndicator">⚔️ MODO BATALHA</div>

  <header style="background: var(--color-bg-secondary); padding: 1rem 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2);">
    <div class="container">
      <div class="flex flex-between flex-center">
        <div class="flex gap-md flex-center">
          <h1 style="font-size: 1.25rem; margin: 0;">🎭 <span id="masterNick">Mestre</span></h1>
          <span class="badge badge-gold" id="roomName">Mesa</span>
        </div>
        <div class="flex gap-md">
          <button class="btn btn-success btn-sm" id="toggleBattleBtn">⚔️ Ativar Batalha</button>
          <button class="btn btn-danger btn-sm" id="endSessionBtn">Encerrar</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="master-layout">
        <aside class="sidebar-left">
          <div class="panel">
            <h3 class="panel-title">🎲 Dados Rápidos</h3>
            <div class="dice-container mb-md">
              <div class="dice-display" id="diceDisplay">-</div>
            </div>
            <div class="dice-buttons mb-md">
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d4">d4</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d6">d6</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d8">d8</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d10">d10</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d12">d12</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d20">d20</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="2d6">2d6</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d100">d100</button>
            </div>
            <input type="text" class="input mb-sm" id="customDiceInput" placeholder="Ex: 2d6+3">
            <button class="btn btn-primary btn-block" id="rollCustomBtn">Rolar</button>
          </div>

          <div class="panel">
            <h3 class="panel-title">📜 Histórico</h3>
            <div id="rollHistory" style="max-height: 150px; overflow-y: auto;"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🗺️ Mapa</h3>
            <div class="flex gap-sm mb-sm">
              <button class="btn btn-secondary btn-sm" id="loadMapBtn">🗺 Carregar Mapa</button>
              <button class="btn btn-secondary btn-sm" id="toggleGridBtn">🔲 Grid</button>
            </div>
          </div>

          <div class="panel">
            <h3 class="panel-title">⚔️ NPCs</h3>
            <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;">
              <button onclick="MasterSystem.openNpcModal('hostile')" class="btn btn-sm" style="background:#dc2626;color:white;border:none;">+ Hostil</button>
              <button onclick="MasterSystem.openNpcModal('neutral')" class="btn btn-sm" style="background:#ca8a04;color:white;border:none;">+ Neutro</button>
              <button onclick="MasterSystem.openNpcModal('friendly')" class="btn btn-sm" style="background:#16a34a;color:white;border:none;">+ Amigável</button>
            </div>
            <div id="npcCardsContainer" style="display:flex;gap:8px;flex-wrap:wrap;padding:4px 0;min-height:40px;"></div>
          </div>
        </aside>

        <section class="main-area">
          <div id="mapContainer" style="height: 100%; border-radius: var(--radius-lg); overflow: hidden;">
            <!-- O MapSystem irá preencher o HTML aqui automaticamente -->
          </div>

          <div class="panel mt-md chat-container">
            <h3 class="panel-title">💬 Chat</h3>
            <div class="chat-messages" id="chatMessages" style="height: 200px; overflow-y: auto; padding: 0.5rem; background: var(--color-bg-secondary); border-radius: var(--radius-md);"></div>
            <form id="chatForm" class="flex gap-sm mt-md">
               <input type="text" id="chatInput" class="input" placeholder="Conectando..." autocomplete="off" disabled>
               <button type="submit" class="btn btn-primary" id="chatSendBtn" disabled>Enviar</button>
             </form>
          </div>
        </section>

        <aside class="sidebar-right">
          <div class="panel">
            <h3 class="panel-title">👥 Jogadores</h3>
            <div id="playersList" class="players-list"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🪙 Fichas dos Jogadores</h3>
            <div id="masterPlayerSheets"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🎭 Tokens</h3>
            <div id="tokensList" class="tokens-panel"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🖌️ Ferramentas</h3>
            <div id="drawToolbar" style="display:flex;align-items:center;gap:6px;padding:6px;
              background:#1a1208;border:1px solid #8a6a1a;border-radius:4px;flex-wrap:wrap;">
              <span style="font-family:'Cinzel',serif;font-size:0.5rem;color:#8a6a1a;letter-spacing:1px;">DESENHO</span>

              <button id="btnPen" onclick="DrawSystem.setTool('pen')"
                title="Caneta"
                style="width:30px;height:30px;background:#1a1208;border:1px solid #8a6a1a;
                  color:#c9a84c;border-radius:4px;cursor:pointer;font-size:1rem;">✏️</button>

              <button id="btnEraser" onclick="DrawSystem.setTool('eraser')"
                title="Borracha"
                style="width:30px;height:30px;background:#1a1208;border:1px solid #8a6a1a;
                  color:#c9a84c;border-radius:4px;cursor:pointer;font-size:1rem;">🧹</button>

              <input type="color" id="drawColor" value="#e74c3c"
                title="Cor"
                style="width:30px;height:30px;padding:0;border:1px solid #8a6a1a;
                  border-radius:4px;cursor:pointer;background:none;">

              <input type="range" id="drawSize" min="2" max="30" value="4"
                title="Espessura"
                style="width:60px;accent-color:#c9a84c;">

              <button id="btnClearDraw" onclick="DrawSystem.clear()"
                title="Limpar desenho"
                style="width:30px;height:30px;background:#1a1208;border:1px solid #8b1a1a;
                  color:#e74c3c;border-radius:4px;cursor:pointer;font-size:0.9rem;">🗑</button>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script type="module">
    import { AuthSystem } from './js/auth.js';
    import { RoomSystem } from './js/room.js';
    import { ChatSystem } from './js/chat.js';
    import { MasterSystem } from './js/master.js';
    import { MapSystem } from './js/map.js';
    import { BattleSystem } from './js/battle.js';
    import { DiceSystem } from './js/dice.js';
    import { SoundManager } from './js/sounds.js';

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('code');

    async function init() {
      try {
        if (!roomCode) { window.location.href = 'index.html'; return; }

        await AuthSystem.waitForInitialization();
        if (!AuthSystem.isAuthenticated()) { window.location.href = 'index.html'; return; }

        await RoomSystem.joinRoom(roomCode);

        document.getElementById('masterNick').textContent = AuthSystem.currentNick || 'Mestre';

        await MapSystem.initialize('mapContainer');
        MapSystem.subscribeToMap();

        // Inscreve nos ouvintes da sala
        RoomSystem.subscribeToRoom(roomCode, {
          onRoomUpdate: (room) => {
            document.getElementById('battleIndicator').classList.toggle('active', room.battleMode);
            if (room.battleMode) {
              document.getElementById('toggleBattleBtn').textContent = '⚔️ Desativar Batalha';
              document.getElementById('toggleBattleBtn').classList.remove('btn-success');
              document.getElementById('toggleBattleBtn').classList.add('btn-danger');
            }
          },
          onPlayersUpdate: (players) => {
             // O render logic foi para index ou players, manter original
          }
        });

        console.log("[Master] Inicializando Chat e Batalha...");
        ChatSystem.subscribeToChat(roomCode, (msg) => {
           // O renderChat original deve ser renderChatMessages se foi renomeado, 
           // mas verificarei o nome. Pra segurança, usarei as que estavam no master inicial
           if (typeof renderChatMessages === 'function') renderChatMessages(msg);
           else if (typeof renderChat === 'function') renderChat(msg);
        });
        ChatSystem.subscribeToDice(roomCode, (dice) => {
           if (typeof renderDiceHistory === 'function') renderDiceHistory(dice);
           else if (typeof renderRollHistory === 'function') renderRollHistory(dice);
        });

        await MasterSystem.initialize();
        await BattleSystem.initialize();
        if (window.DrawSystem) window.DrawSystem.init();

        // Habilita o chat após entrar na sala
        const chatInput = document.getElementById('chatInput');
        chatInput.disabled = false;
        chatInput.placeholder = "Digite sua mensagem...";
        document.getElementById('chatSendBtn').disabled = false;

        console.log("[Master] Sistemas prontos!");

      } catch (error) {
        console.error("[Master] Erro crítico na inicialização:", error);
        alert("Erro ao carregar mesa. Verifique o console.");
      }
    }

    // ── funções de render ──────────────────────────────

    function renderPlayers(players) {
      const container = document.getElementById('playersList');
      container.innerHTML = players.map(p => `
        <div class="player-item">
          <div class="player-avatar">${p.nick?.[0]?.toUpperCase() || '?'}</div>
          <span class="player-name">${p.nick}</span>
          <span class="player-status ${!p.online ? 'offline' : ''}">${p.online ? 'Online' : 'Offline'}</span>
        </div>
      `).join('');
    }

    function renderChat(messages) {
      const container = document.getElementById('chatMessages');
      container.innerHTML = messages.slice(-50).map(m => {
        const time = new Date(m.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const typeClass = m.type === 'roll' ? 'text-gold' : m.type === 'action' ? 'text-green' : m.type === 'battle' ? 'text-red' : m.type === 'system' ? 'text-purple' : '';
        
        if (m.type === 'roll') {
          return `<div class="message"><span class="message-sender">${m.senderNick}</span> <span class="text-muted" style="font-size: 0.75rem;">${time}</span><div class="message-roll">🎲 ${m.text}</div></div>`;
        }
        return `<div class="message ${typeClass}"><span class="message-sender">${m.senderNick}</span> <span class="text-muted" style="font-size: 0.75rem;">${time}</span><div>${m.text}</div></div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function renderRollHistory(rolls) {
      const container = document.getElementById('rollHistory');
      container.innerHTML = rolls.slice(-10).reverse().map(r => `
        <div class="mb-sm" style="padding: 0.5rem; background: var(--color-bg-secondary); border-radius: var(--radius-sm);">
          <strong>${r.rolledBy}</strong> <span class="text-gold">${r.dice}</span> = ${r.total}
          ${r.context ? `<div class="text-muted" style="font-size: 0.8rem;">${r.context}</div>` : ''}
        </div>
      `).join('') || '<p class="text-muted" style="font-size: 0.85rem;">Nenhuma rolagem ainda</p>';
    }

    function renderTokens() {
      const container = document.getElementById('tokensList');
      const tokens = Object.values(MapSystem.tokens || {});
      
      container.innerHTML = tokens.map(t => `
        <div class="token-item" style="
          display: flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.5rem;
          background: var(--color-bg-secondary);
          border-radius: var(--radius-sm);
          border-left: 3px solid ${t.color};
        ">
          <span>${t.name}</span>
          ${t.hpMax > 0 ? `<span class="text-muted" style="font-size: 0.8rem;">${t.hp}/${t.hpMax} HP</span>` : ''}
        </div>
      `).join('') || '<p class="text-muted" style="font-size: 0.85rem;">Nenhum token</p>';
    }

    init();

    async function rollDice(dice) {
      const display = document.getElementById('diceDisplay');
      const result = await DiceSystem.rollWithAnimation(dice, display, { animate: true });
      display.textContent = result.total;
      await ChatSystem.sendRoll(dice, result.results, result.total, 'Mestre');
      SoundManager.playDiceRoll();
      setTimeout(() => SoundManager.playDiceLand(), 300);
    }

    document.querySelectorAll('.dice-btn').forEach(btn => {
      btn.addEventListener('click', () => rollDice(btn.dataset.dice));
    });

    document.getElementById('rollCustomBtn').addEventListener('click', () => {
      const input = document.getElementById('customDiceInput').value.trim();
      if (input) rollDice(input);
    });

    document.getElementById('customDiceInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const input = e.target.value.trim();
        if (input) rollDice(input);
      }
    });

    document.getElementById('chatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = document.getElementById('chatInput').value.trim();
      if (text) {
        await ChatSystem.sendMessage(text);
        document.getElementById('chatInput').value = '';
      }
    });

    document.getElementById('toggleBattleBtn').addEventListener('click', async () => {
      await MasterSystem.toggleBattleMode();
    });

    document.getElementById('endSessionBtn').addEventListener('click', async () => {
      await MasterSystem.endSession();
    });



    document.getElementById('loadMapBtn').addEventListener('click', () => {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          MapSystem.uploadMapImage(file);
        }
      });
      document.body.appendChild(fileInput);
      fileInput.click();
      fileInput.remove();
    });

    document.getElementById('toggleGridBtn').addEventListener('click', () => {
      MapSystem.toggleGrid();
    });



    setInterval(() => {
      renderTokens();
    }, 2000);

    window.DrawSystem = {
      tool: 'none',
      drawing: false,
      canvas: null,
      ctx: null,

      init() {
        this.canvas = document.getElementById('drawCanvas');
        if (!this.canvas) return;
        this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
        this.resize();
        window.addEventListener('resize', () => this.resize());

        document.addEventListener('mousedown', (e) => {
          if (this.tool !== 'none' && e.target !== this.canvas && !e.target.closest('#drawToolbar')) {
            this.setTool('none');
          }
        });

        this.canvas.addEventListener('mousedown', (e) => {
          if (this.tool === 'none') return;
          this.drawing = true;
          const pos = this.getPos(e);
          this.ctx.beginPath();
          this.ctx.moveTo(pos.x, pos.y);
        });

        this.canvas.addEventListener('mousemove', (e) => {
          if (!this.drawing || this.tool === 'none') return;
          const pos = this.getPos(e);
          const size = parseInt(document.getElementById('drawSize')?.value || 4);
          if (this.tool === 'eraser') {
            this.ctx.clearRect(pos.x - size, pos.y - size, size * 2, size * 2);
          } else {
            this.ctx.strokeStyle = document.getElementById('drawColor')?.value || '#e74c3c';
            this.ctx.lineWidth   = size;
            this.ctx.lineCap     = 'round';
            this.ctx.lineJoin    = 'round';
            this.ctx.lineTo(pos.x, pos.y);
            this.ctx.stroke();
            this.ctx.beginPath();
            this.ctx.moveTo(pos.x, pos.y);
          }
        });

        this.canvas.addEventListener('mouseup',    () => { this.drawing = false; });
        this.canvas.addEventListener('mouseleave', () => { this.drawing = false; });
      },

      setTool(tool) {
        this.tool = (this.tool === tool) ? 'none' : tool;
        this.canvas.style.pointerEvents = this.tool !== 'none' ? 'all' : 'none';
        this.canvas.style.cursor = this.tool === 'pen' ? 'crosshair' : this.tool === 'eraser' ? 'cell' : 'default';
        document.getElementById('btnPen')?.style.setProperty('border-color',    this.tool === 'pen'    ? '#e8c97a' : '#8a6a1a');
        document.getElementById('btnEraser')?.style.setProperty('border-color', this.tool === 'eraser' ? '#e8c97a' : '#8a6a1a');
      },

      clear() {
        if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      },

      resize() {
        if (!this.canvas) return;
        const parent = this.canvas.parentElement;
        if (!parent) return;
        const saved = this.ctx?.getImageData(0, 0, this.canvas.width, this.canvas.height);
        this.canvas.width  = parent.offsetWidth;
        this.canvas.height = parent.offsetHeight;
        if (saved) this.ctx.putImageData(saved, 0, 0);
      },

      getPos(e) {
        const rect = this.canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }
    };

    window.addEventListener('beforeunload', () => {
      ChatSystem.unsubscribe();
      MapSystem.unsubscribe();
      MasterSystem.cleanup();
      BattleSystem.cleanup();
      RoomSystem.cleanup();
    });
  </script>
</body>
</html>
