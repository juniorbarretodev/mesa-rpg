<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Jogador - RPG Platform</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/map.css">
  <style>
    .player-layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 1rem;
      min-height: calc(100vh - 80px);
    }

    .sheet-section {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--color-bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 2px solid var(--color-accent-gold);
    }

    .char-info h3 {
      margin: 0;
      font-size: 1.25rem;
    }

    .char-info p {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 0.9rem;
    }

    .resource-bar {
      margin-bottom: 0.75rem;
    }

    .resource-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
    }

    .bar-container {
      height: 20px;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }

    .bar-fill.hp {
      background: linear-gradient(90deg, #dc2626, #ef4444);
    }

    .bar-fill.mana {
      background: linear-gradient(90deg, #2563eb, #3b82f6);
    }

    .bar-fill.stamina {
      background: linear-gradient(90deg, #16a34a, #22c55e);
    }

    .status-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      background: rgba(220, 38, 38, 0.2);
      border-radius: 9999px;
      font-size: 0.75rem;
      color: var(--color-accent-red);
    }

    .status-badge.buff {
      background: rgba(22, 163, 74, 0.2);
      color: var(--color-accent-green);
    }

    .ability-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .ability-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .ability-item:hover {
      background: var(--color-bg-tertiary);
      transform: translateX(5px);
    }

    .ability-name {
      font-weight: 500;
    }

    .ability-dice {
      color: var(--color-accent-gold);
      font-weight: 600;
    }

    .ability-cost {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    .grimoire-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .grimoire-card {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      border-left: 3px solid var(--color-accent-gold);
    }

    .grimoire-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .grimoire-card-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .grimoire-card-type {
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--color-bg-tertiary);
    }

    .grimoire-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }

    .grimoire-tag {
      font-size: 0.65rem;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      background: rgba(212, 175, 55, 0.2);
      color: var(--color-accent-gold);
    }

    .grimoire-tag.dano { background: rgba(220, 38, 38, 0.2); color: #ef4444; }
    .grimoire-tag.cura { background: rgba(22, 163, 74, 0.2); color: #22c55e; }
    .grimoire-tag.controle { background: rgba(147, 51, 234, 0.2); color: #a855f7; }
    .grimoire-tag.suporte { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .grimoire-tag.truque { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
    .grimoire-tag.passiva { background: rgba(212, 175, 55, 0.2); color: #fbbf24; }

    .grimoire-desc {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .grimoire-use-btn {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
    }

    .map-viewer {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(212, 175, 55, 0.2);
      aspect-ratio: 16/10;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--color-text-muted);
      text-align: center;
    }

    .map-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .map-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
    }

    .tokens-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .map-token {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9rem;
      pointer-events: none;
    }

    .map-token.player {
      border-color: #d4af37 !important;
      background-color: rgba(212, 175, 55, 0.3) !important;
    }

    .map-token.enemy {
      border-color: #dc2626 !important;
      background-color: rgba(220, 38, 38, 0.3) !important;
    }

    .map-token.npc {
      border-color: #3b82f6 !important;
      background-color: rgba(59, 130, 246, 0.3) !important;
    }

    .map-token.object {
      border-color: #6b7280 !important;
      background-color: rgba(107, 114, 128, 0.3) !important;
    }

    .token-name {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.7);
      padding: 1px 4px;
      border-radius: 2px;
      color: white;
    }

    .map-token.hidden {
      opacity: 0.2;
    }

    .chat-container {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(212, 175, 55, 0.2);
      height: 280px;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
    }

    .chat-input-area {
      padding: 0.75rem;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      display: flex;
      gap: 0.5rem;
    }

    .message {
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .message:last-child {
      border-bottom: none;
    }

    .message-sender {
      font-weight: 600;
      color: var(--color-accent-gold);
    }

    .message-roll {
      background: rgba(212, 175, 55, 0.1);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      display: inline-block;
    }

    .message-system {
      color: var(--color-accent-purple);
      font-style: italic;
    }

    .message-battle {
      color: var(--color-accent-red);
      border-left: 2px solid var(--color-accent-red);
      padding-left: 0.5rem;
    }

    .dice-quick-panel {
      display: flex;
      gap: 0.25rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: 0.5rem;
    }

    .dice-result {
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--color-accent-gold);
      min-height: 2rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .tab {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: var(--radius-md);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .tab:hover {
      border-color: var(--color-accent-gold);
    }

    .tab.active {
      background: var(--color-accent-gold);
      border-color: var(--color-accent-gold);
      color: var(--color-bg-primary);
    }

    .battle-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-accent-red);
      color: white;
      padding: 0.5rem 2rem;
      border-radius: var(--radius-md);
      font-weight: bold;
      z-index: 100;
      display: none;
      animation: pulse-red 1s infinite;
    }

    .battle-indicator.active {
      display: block;
    }

    @keyframes pulse-red {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5);
      }

      50% {
        box-shadow: 0 0 0 10px rgba(220, 38, 38, 0);
      }
    }

    .turn-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid var(--color-accent-gold);
      padding: 0.5rem 1.5rem;
      border-radius: var(--radius-md);
      z-index: 99;
      display: none;
    }

    .turn-indicator.active {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .turn-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .round-badge {
      background: var(--color-accent-gold);
      color: var(--color-bg-primary);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: bold;
      font-size: 0.85rem;
    }

    .your-turn {
      background: var(--color-accent-green) !important;
      animation: glow-green 1s infinite;
    }

    @keyframes glow-green {

      0%,
      100% {
        box-shadow: 0 0 5px rgba(22, 163, 74, 0.5);
      }

      50% {
        box-shadow: 0 0 20px rgba(22, 163, 74, 0.8);
      }
    }

    .battle-mode .chat-container {
      border-color: var(--color-accent-red);
    }

    @media (max-width: 900px) {
      .player-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="page battle-mode">
  <div class="turn-indicator" id="turnIndicator"></div>
  <div class="battle-indicator" id="battleIndicator">⚔️ MODO BATALHA - Sua Vez!</div>

  <header
    style="background: var(--color-bg-secondary); padding: 1rem 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2);">
    <div class="container">
      <div class="flex flex-between flex-center">
        <h1 style="font-size: 1.25rem; margin: 0;">🏰 RPG Platform</h1>
        <div class="flex gap-md flex-center">
          <span class="badge badge-gold" id="roomCode">-----</span>
          <button class="btn btn-secondary btn-sm" id="soundToggle">🔊</button>
          <button class="btn btn-danger btn-sm" id="leaveBtn">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="player-layout">
        <aside class="character-sheet">
          <div class="sheet-section">
            <div class="sheet-header">
              <div class="avatar" id="charAvatar">?</div>
              <div class="char-info">
                <h3 id="charName">Carregando...</h3>
                <p id="charClass">---</p>
              </div>
            </div>

            <div class="resource-bar">
              <div class="resource-label">
                <span>❤️ HP</span>
                <span id="hpText">0 / 0</span>
              </div>
              <div class="bar-container">
                <div class="bar-fill hp" id="hpBar" style="width: 0%"></div>
              </div>
            </div>

            <div class="status-badges" id="statusBadges"></div>
            </div>

          <div class="tabs">
            <button class="tab active" data-tab="general">👤 Geral</button>
            <button class="tab" data-tab="abilities">⚔️ Habilidades</button>
            <button class="tab" data-tab="grimoire">📖 Grimório</button>
            <button class="tab" data-tab="items">🎒 Itens</button>
          </div>

          <div class="sheet-section">
            <div id="generalTab" class="tab-content"></div>
            <div id="abilitiesTab" class="tab-content hidden"></div>
            <div id="grimoireTab" class="tab-content hidden"></div>
            <div id="itemsTab" class="tab-content hidden"></div>
          </div>
        </aside>

        <section class="main-area">
          <div id="allPlayerCards" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;"></div>
          <div id="endTurnWrapper" style="display:none;margin-bottom:8px;text-align:center;">
            <button id="endTurnBtn" class="btn btn-warning" style="background:#f59e0b;color:#1a1208;border:none;padding:8px 24px;border-radius:6px;font-weight:bold;font-size:0.95rem;cursor:pointer;">
              ⏭️ Fim da Jogada — Passar a Vez
            </button>
          </div>
          <div class="map-viewer" id="mapViewer">
            <div id="mapWrapper" class="map-wrapper">
              <img id="mapImage" class="map-image" style="display: none;">
              <div id="tokensLayer" class="tokens-layer"></div>
              <div class="map-placeholder" id="mapPlaceholder">
                <p style="font-size: 3rem; margin-bottom: 1rem;">🗺️</p>
                <p>Mapa da Mesa</p>
              </div>
            </div>
          </div>

          <div class="chat-container mt-md">
            <div class="dice-quick-panel">
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d4">d4</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d6">d6</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d8">d8</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d10">d10</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d12">d12</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d20">d20</button>
            </div>
            <div class="dice-result" id="diceResult">-</div>

            <div class="chat-messages" id="chatMessages"></div>

            <form class="chat-input-area" id="chatForm">
              <input type="text" id="chatInput" class="input" placeholder="Conectando..." autocomplete="off" disabled>
              <button type="submit" class="btn btn-primary" id="chatSendBtn" disabled>Enviar</button>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script type="module">
    import { collection, onSnapshot } from "firebase/firestore";
    import { ref as dbRef, onValue as onRtdbValue, set } from "firebase/database";
    import { db, rtdb } from './js/firebase.js';
    import { AuthSystem } from './js/auth.js';
    import { RoomSystem } from './js/room.js';
    import { ChatSystem } from './js/chat.js';
    import { SheetSystem } from './js/sheet.js';
    import { DiceSystem } from './js/dice.js';
    import { SoundManager } from './js/sounds.js';
    import { MapSystem } from './js/map.js';
    import { BattleSystem } from './js/battle.js';

    // ✅ CORREÇÃO: leitura do código da sala pela URL
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('code');

    async function init() {
      try {
        console.log("[Player] Iniciando sistemas...");
        // Aguarda a inicialização do Firebase antes de verificar o login
        await AuthSystem.waitForInitialization();

        if (!roomCode || !AuthSystem.isAuthenticated()) {
          window.location.href = 'index.html';
          return;
        }

        document.getElementById('roomCode').textContent = roomCode;

        await RoomSystem.joinRoom(roomCode);

        console.group(`[Player Page] Inicializando Mesa: ${roomCode}`);
        console.log('User UID:', AuthSystem.currentUser?.uid);
        console.log('Is Master?', RoomSystem.isMaster);
        console.groupEnd();

        // Inicializa o Mapa primeiro
        console.log("[Player] Inicializando Mapa...");
        await MapSystem.initialize('mapViewer');
        MapSystem.subscribeToMap();

        console.log("[Player] Carregando Ficha e Batalha...");
        await SheetSystem.loadOrCreateSheet(roomCode);
        await BattleSystem.initialize();

        // Mostra modal de iniciativa ao jogador quando o mestre iniciar
        BattleSystem.showPlayerInitiativeModal();

        SheetSystem.subscribeToSheet(roomCode, renderSheet);
        ChatSystem.subscribeToChat(roomCode, renderChat);

        // Carrega initMods em tempo real
        const allPlayerCardsSub = (snap) => {
          const container = document.getElementById('allPlayerCards');
          if (!container) return;
          container.innerHTML = '';

          // Lê initMods uma vez
          onRtdbValue(dbRef(rtdb, `rooms/${roomCode}/playerInitMods`), (initSnap) => {
            const initMods = initSnap.val() || {};

            snap.forEach(docSnap => {
              const s = docSnap.data();
              const playerId = docSnap.id;
              const hpPct = Math.max(0, Math.min(100, ((s.hp || 0) / (s.hpMax || 20)) * 100));
              const isMe = playerId === AuthSystem.currentUser?.uid;
              const avatarUrl = s.avatarUrl || '';
              const initMod = initMods[playerId]?.mod ?? 0;

              const av = avatarUrl
                ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">`
                : `<span style="font-size:1.2rem;">${s.name?.[0]?.toUpperCase() || '?'}</span>`;

              const card = document.createElement('div');
              card.id = `player-card-${playerId}`;
              card.style.cssText = `
                background:#1a1208;border:2px solid ${isMe ? '#c9a84c' : '#4a3820'};
                border-radius:6px;padding:8px;width:140px;flex-shrink:0;position:relative;
              `;

              let html = `
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
                  <div style="width:36px;height:36px;border-radius:50%;border:1px solid #8a6a1a;
                    background:#0a0705;overflow:hidden;display:flex;align-items:center;
                    justify-content:center;flex-shrink:0;cursor:pointer;" title="Trocar avatar"
                    ${isMe ? 'id="avatarBtn-' + playerId + '"' : ''}>${av}</div>
                  <div style="font-family:'Cinzel',serif;font-size:0.62rem;color:#e8c97a;
                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                    ${s.name || '?'} ${isMe ? '(você)' : ''}
                  </div>
                </div>
                <div style="font-size:0.6rem;color:#a08050;margin-bottom:3px;">
                  ❤ ${s.hp || 0} / ${s.hpMax || 20}
                </div>
                <div style="height:4px;background:#333;border-radius:2px;overflow:hidden;margin-bottom:6px;">
                  <div style="height:100%;width:${hpPct}%;background:${hpPct > 50 ? '#16a34a' : hpPct > 25 ? '#ca8a04' : '#dc2626'};"></div>
                </div>
                ${(s.status || []).length > 0 ? `<div style="font-size:0.5rem;color:#f1c40f;margin-bottom:4px;">⚠ ${s.status.join(', ')}</div>` : ''}
                <div style="display:flex;align-items:center;gap:4px;margin-top:4px;">
                  <label style="font-size:0.5rem;color:#8a6a1a;">Init:</label>
                  <input type="number" value="${initMod}" step="1" min="-5" max="10"
                    style="width:36px;background:#0a0705;border:1px solid #8a6a1a;color:#e8d8b0;
                    border-radius:3px;padding:2px;text-align:center;font-size:0.65rem;"
                    data-initmod-player="${playerId}"
                    ${isMe ? '' : 'style="opacity:0.6;"'}
                    onchange="window.updateInitMod('${playerId}', this.value)">
                </div>
              `;

              if (isMe) {
                html += `<input type="file" id="avatarFile-${playerId}" accept="image/*" style="display:none;">`;
              }

              card.innerHTML = html;
              container.appendChild(card);

              // Avatar upload para meu card
              if (isMe) {
                const avatarBtn = document.getElementById(`avatarBtn-${playerId}`);
                const fileInput = document.getElementById(`avatarFile-${playerId}`);
                if (avatarBtn && fileInput) {
                  avatarBtn.addEventListener('click', () => fileInput.click());
                  fileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    try {
                      const formData = new FormData();
                      formData.append('key', '00e4e8b63e8248b4e584774dad7cff00');
                      formData.append('image', file);
                      const resp = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
                      const data = await resp.json();
                      if (data.success) {
                        await SheetSystem.updateSheet({ avatarUrl: data.data.url });
                      }
                    } catch (err) {
                      console.error('Erro ao fazer upload de avatar:', err);
                    }
                    fileInput.value = '';
                  });
                }
              }
            });
          }, { onlyOnce: true });
        };

        const sheetsRef = collection(db, 'sheets', roomCode, 'players');
        onSnapshot(sheetsRef, allPlayerCardsSub);

        // Função global para salvar initMod do player
        window.updateInitMod = async function(playerId, value) {
          const mod = parseInt(value) || 0;
          await set(dbRef(rtdb, `rooms/${roomCode}/playerInitMods/${playerId}`), { mod });
        };

        // Habilita o chat após entrar na sala
        const chatInput = document.getElementById('chatInput');
        chatInput.disabled = false;
        chatInput.placeholder = "Digite sua mensagem ou use uma habilidade...";
        document.getElementById('chatSendBtn').disabled = false;
        console.log("[Player] Sistemas prontos!");

      } catch (error) {
        console.error("[Player] Erro crítico na inicialização:", error);
        alert("Erro ao carregar partida. Verifique o console.");
      }
    }

    init();

    const GRIMORIO = {

        ]
      },
      "Paladino": {
        color: "#c09020",
        abilities: [
          { name: "Golpe Divino", type: "Dano", desc: "Smite: gasta slot de magia após acertar ataque. Causa +2d8 dano radiante por nível do slot (max 5d8). +1d8 extra contra mortos-vivos.", tags: ["Dano", "Reação"] },
          { name: "Cura pelas Mãos", type: "Cura", desc: "Pool de cura = 5 × nível. Ação: restaura PV tocando criatura. Pode curar doenças/venenos (5 PV do pool cada).", tags: ["Cura", "Ativo"] },

          { name: "Explosão Eldritch", type: "Truque", desc: "Alcance 36m. 1d10 de dano de força.", tags: ["Dano", "Truque"] },
          { name: "Armadura Amaldiçoada", type: "Ativa", desc: "Maldição um alvo: +1d6 necrótico em cada acerto. Desvantagem em testes do atributo escolhido. Alcance 27m.", tags: ["Controle", "Nv1"] },
          { name: "Praga", type: "Controle", desc: "Amaldiçoa criatura. Desvantagem em testes do atributo escolhido. +1d6 necrótico extra em cada acerto. Alcance 27m. Concentração 1h.", tags: ["Controle", "Nv1"] },
          { name: "Mente Desperta", type: "Especial", desc: "Comunicação telepática com criaturas visíveis até 9m. Não precisa compartilhar idioma. Uso ilimitado.", tags: ["Especial"] }

    function renderSheet(sheet) {
      if (!sheet) return;

      // Verificação se elementos existem antes de manipular
      const safe = (id) => document.getElementById(id);

      safe('charAvatar') && (safe('charAvatar').textContent = sheet.name?.[0]?.toUpperCase() || '?');
      safe('charName') && (safe('charName').textContent = sheet.name);
      safe('charClass') && (safe('charClass').textContent = `${sheet.class} Nv. ${sheet.level}`);

      safe('hpText') && (safe('hpText').textContent = `${sheet.hp} / ${sheet.hpMax}`);
      safe('hpBar') && (safe('hpBar').style.width = `${(sheet.hp / sheet.hpMax) * 100}%`);

      const statusContainer = document.getElementById('statusBadges');
      statusContainer.innerHTML = (sheet.status || []).map(s =>
        `<span class="status-badge ${s.startsWith('+') ? 'buff' : ''}">${s}</span>`
      ).join('');

      const generalTab = document.getElementById('generalTab');
      generalTab.innerHTML = `
        <div style="display: flex; gap: 1rem; align-items: center;">
          <div class="avatar" style="width: 80px; height: 80px; font-size: 2rem;">${sheet.name?.[0]?.toUpperCase() || '?'}</div>
          <div>
            <h3 style="margin: 0 0 0.25rem 0;">${sheet.name || 'Sem nome'}</h3>
            <p style="margin: 0; color: var(--color-text-secondary);">${sheet.class || 'Aventureiro'} — Nível ${sheet.level || 1}</p>
          </div>
        </div>
      `;

      const abilitiesTab = document.getElementById('abilitiesTab');
      const allAbilities = [...(sheet.attacks || []), ...(sheet.spells || [])];
      abilitiesTab.innerHTML = allAbilities.length ? allAbilities.map(a => `
        <div class="ability-item" data-ability="${a.name}" data-type="${sheet.attacks?.includes(a) ? 'attack' : 'spell'}">
          <div>
            <div class="ability-name">${a.name}</div>
            <div class="ability-cost">${a.description || 'Ação padrão'}</div>
          </div>
          <div class="ability-dice">${a.dice}${a.bonus ? ' +' + a.bonus : ''}</div>
        </div>
      `).join('') : '<p class="text-muted">Nenhuma habilidade cadastrada</p>';

      const grimoireTab = document.getElementById('grimoireTab');
      const charClass = sheet.class || 'Guerreiro';
      const grimoireData = GRIMORIO[charClass] || GRIMORIO["Guerreiro"];
      grimoireTab.innerHTML = `
        <div class="grimoire-cards">
          ${(grimoireData.abilities || []).map(ability => `
            <div class="grimoire-card" style="border-left-color: ${grimoireData.color};">
              <div class="grimoire-card-header">
                <span class="grimoire-card-title">${ability.name}</span>
                <span class="grimoire-card-type">${ability.type}</span>
              </div>
              <div class="grimoire-tags">
                ${(ability.tags || []).map(tag => {
                  const tagClass = tag.toLowerCase().includes('dano') ? 'dano' :
                    tag.toLowerCase().includes('cura') ? 'cura' :
                    tag.toLowerCase().includes('controle') ? 'controle' :
                    tag.toLowerCase().includes('suporte') ? 'suporte' :
                    tag.toLowerCase().includes('truque') ? 'truque' :
                    tag.toLowerCase().includes('passiva') ? 'passiva' : '';
                  return `<span class="grimoire-tag ${tagClass}">${tag}</span>`;
                }).join('')}
              </div>
              <div class="grimoire-desc">${ability.desc}</div>
              <button class="btn btn-primary btn-sm grimoire-use-btn" onclick="PlayerActions.useGrimoireAbility('${ability.name}', '${charClass}')">Usar no Chat</button>
            </div>
          `).join('')}
        </div>
      `;

      const itemsTab = document.getElementById('itemsTab');
      itemsTab.innerHTML = (sheet.items || []).map(i => `
        <div class="ability-item" data-item="${i.name}">
          <div>
            <div class="ability-name">${i.name}</div>
            <div class="ability-cost">${i.effect} x${i.quantity}</div>
          </div>
          <button class="btn btn-success btn-sm" onclick="PlayerActions.useItem('${i.id}')">Usar</button>
        </div>
      `).join('') || '<p class="text-muted">Nenhum item</p>';

      attachAbilityListeners(sheet);
    }

    function attachAbilityListeners(sheet) {
      document.querySelectorAll('.ability-item[data-ability]').forEach(item => {
        item.onclick = null;
        item.addEventListener('click', async () => {
          const abilityName = item.dataset.ability;
          const ability = [...(sheet.attacks || []), ...(sheet.spells || [])].find(a => a.name === abilityName);
          if (ability) {
            await ChatSystem.sendMessage(`usa **${abilityName}**`);
            const result = await DiceSystem.rollWithAnimation(ability.dice, null, { animate: false });
            await ChatSystem.sendRoll(ability.dice, result.results, result.total, abilityName);
            document.getElementById('diceResult').textContent = DiceSystem.formatResult(result);
            SoundManager.playDiceRoll();
            setTimeout(() => SoundManager.playDiceLand(), 300);
          }
        });
      });
    }

    function renderChat(messages) {
      const container = document.getElementById('chatMessages');
      container.innerHTML = messages.slice(-50).map(m => {
        const time = new Date(m.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        if (m.type === 'roll') {
          return `<div class="message"><span class="message-sender">${m.senderNick}</span> <span class="text-muted" style="font-size: 0.75rem;">${time}</span><div class="message-roll">🎲 ${m.text}</div></div>`;
        }
        if (m.type === 'system') {
          return `<div class="message message-system"><span class="text-muted" style="font-size: 0.75rem;">${time}</span> ${m.text}</div>`;
        }
        if (m.type === 'battle') {
          return `<div class="message message-battle"><span class="message-sender">${m.senderNick}</span> <span class="text-muted" style="font-size: 0.75rem;">${time}</span><div>${m.text}</div></div>`;
        }
        return `<div class="message"><span class="message-sender">${m.senderNick}:</span> <span class="text-muted" style="font-size: 0.75rem;">${time}</span><div>${m.text}</div></div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function updateMapDisplay() {
      const mapData = MapSystem.currentMap;
      const mapPlaceholder = document.getElementById('mapPlaceholder');
      const mapImage = document.getElementById('mapImage');
      const tokensLayer = document.getElementById('tokensLayer');

      if (mapData?.imageUrl) {
        mapPlaceholder.style.display = 'none';
        mapImage.src = mapData.imageUrl;
        mapImage.style.display = 'block';
      } else {
        mapPlaceholder.style.display = 'block';
        mapImage.style.display = 'none';
      }

      tokensLayer.innerHTML = '';
      Object.values(MapSystem.tokens || {}).forEach(token => {
        if (!token.visible && !RoomSystem.isMaster) return;

        const tokenEl = document.createElement('div');
        tokenEl.className = `map-token ${token.type}${!token.visible ? ' hidden' : ''}`;
        tokenEl.style.cssText = `left: ${token.x}px; top: ${token.y}px; border-color: ${token.color};`;
        tokenEl.innerHTML = `<span>${token.name?.charAt(0).toUpperCase() || '?'}</span><div class="token-name">${token.name}</div>`;
        tokensLayer.appendChild(tokenEl);
      });
    }

    function updateBattleDisplay(state) {
      const indicator = document.getElementById('battleIndicator');
      const turnIndicator = document.getElementById('turnIndicator');

      if (state?.active && state.initiative) {
        indicator.classList.add('active');
        turnIndicator.classList.add('active');

        const currentTurn = state.initiative?.find(i => (i.id || i) === state.turn);
        const currentName = typeof currentTurn === 'object' ? currentTurn?.name : currentTurn;
        const isYourTurn = state.turn === AuthSystem.currentUser?.uid;

        // Mostra/esconde o botão de fim de turno
        const endTurnWrapper = document.getElementById('endTurnWrapper');
        if (endTurnWrapper) endTurnWrapper.style.display = isYourTurn ? 'block' : 'none';

        // Mostra ordem de iniciativa com numeros de posicao
        let html = `<div class="turn-info"><span class="round-badge">Rodada ${state.round || 1}</span>`;
        if (isYourTurn) {
          html += ` <span style="color:#22c55e;font-weight:bold;">SUA VEZ!</span>`;
        } else {
          html += ` <span style="color:#e8c97a;">Vez de: ${currentName || '---'}</span>`;
        }
        html += `</div><div style="margin-top:6px;font-size:0.8rem;">`;

        state.initiative.forEach((p, idx) => {
          const pos = idx + 1;
          const isCurrent = (p.id || p) === state.turn;
          const total = p.initiative ?? '?';

          html += `
            <div style="display:flex;align-items:center;gap:5px;padding:2px 6px;
              ${isCurrent ? 'background:rgba(212,175,55,0.25);border-radius:4px;' : ''}">
              <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;
                border-radius:50%;font-size:0.65rem;font-weight:bold;
                ${pos === 1 ? 'background:#c9a84c;color:#1a1208;' : 'background:#333;color:#888;'}">
                ${pos}
              </span>
              <span style="color:#e8d8b0;">${p.name}</span>
              ${p.dexMod !== undefined && p.dexMod !== null ? `<span style="color:#8a6a1a;font-size:0.65rem;">(DEX ${p.dexMod >= 0 ? '+' : ''}${p.dexMod})</span>` : ''}
              <span style="margin-left:auto;font-family:monospace;font-size:0.7rem;color:#e8c97a;">${total}</span>
            </div>`;
        });
        html += '</div>';

        turnIndicator.innerHTML = html;

        if (isYourTurn) {
          SoundManager.playNotification();
        }
      } else {
        indicator?.classList.remove('active');
        turnIndicator?.classList.remove('active');
        const endTurnWrapper = document.getElementById('endTurnWrapper');
        if (endTurnWrapper) endTurnWrapper.style.display = 'none';
      }
    }

    setInterval(() => {
      try {
        if (document.getElementById('tokensLayer')) {
          updateMapDisplay();
        }
        if (document.getElementById('battleIndicator')) {
          updateBattleDisplay(BattleSystem.battleState);
        }
      } catch (e) { }
    }, 1000);

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        document.getElementById('generalTab').classList.add('hidden');
        document.getElementById('abilitiesTab').classList.add('hidden');
        document.getElementById('grimoireTab').classList.add('hidden');
        document.getElementById('itemsTab').classList.add('hidden');
        document.getElementById(`${tab.dataset.tab}Tab`).classList.remove('hidden');

        SoundManager.playButtonClick();
      });
    });

    document.querySelectorAll('.dice-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const dice = btn.dataset.dice;
        const result = await DiceSystem.rollWithAnimation(dice, null, { animate: false });
        document.getElementById('diceResult').textContent = DiceSystem.formatResult(result);
        await ChatSystem.sendRoll(dice, result.results, result.total, 'Teste');
        SoundManager.playDiceRoll();
        setTimeout(() => SoundManager.playDiceLand(), 300);
      });
    });

    document.getElementById('chatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = document.getElementById('chatInput').value.trim();
      if (text) {
        const parsedAction = BattleSystem.parsePlayerAction(text, AuthSystem.currentUser?.uid);

        if (parsedAction.detected) {
          const battleResult = await BattleSystem.processBattleAction(parsedAction);
          if (battleResult) {
            await ChatSystem.sendMessage(battleResult.text, battleResult.type);
          }
        } else {
          await ChatSystem.sendMessage(text);
        }

        document.getElementById('chatInput').value = '';
      }
    });

    document.getElementById('soundToggle').addEventListener('click', () => {
      const muted = SoundManager.toggleMute();
      document.getElementById('soundToggle').textContent = muted ? '🔇' : '🔊';
    });

    document.getElementById('leaveBtn').addEventListener('click', async () => {
      await RoomSystem.leaveRoom(roomCode);
      window.location.href = 'index.html';
    });

    document.getElementById('endTurnBtn')?.addEventListener('click', async () => {
      const btn = document.getElementById('endTurnBtn');
      btn.disabled = true;
      btn.textContent = 'Passando a vez...';
      await BattleSystem.endTurn();
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '⏭️ Fim da Jogada — Passar a Vez';
      }, 4000);
    });

    const PlayerActions = {
      async useItem(itemId) {
        const sheet = SheetSystem.currentSheet;
        const item = sheet?.items?.find(i => i.id === itemId);
        if (!item || item.quantity <= 0) return;

        await ChatSystem.sendMessage(`usou **${item.name}**!`);

        const match = item.effect?.match(/(\d*)d(\d+)/i);
        if (match) {
          const result = DiceSystem.roll(match[0]);
          await ChatSystem.sendRoll(match[0], result.results, result.total, item.name);
          SoundManager.playDiceRoll();
          setTimeout(() => SoundManager.playDiceLand(), 300);
        }

        await SheetSystem.removeItem(itemId);
      },

      async useGrimoireAbility(abilityName, charClass) {
        const grimoireData = GRIMORIO[charClass] || GRIMORIO["Guerreiro"];
        const ability = grimoireData.abilities?.find(a => a.name === abilityName);
        
        await ChatSystem.sendMessage(`usa **${abilityName}** do Grimório!`);
        
        if (ability) {
          document.getElementById('diceResult').textContent = ability.desc;
        }
        
        SoundManager.playButtonClick();
      }
    };

    window.PlayerActions = PlayerActions;

    window.addEventListener('beforeunload', () => {
      ChatSystem.unsubscribe();
      MapSystem.unsubscribe();
      SheetSystem.unsubscribe();
      BattleSystem.cleanup();
      RoomSystem.cleanup();
    });
  </script>
