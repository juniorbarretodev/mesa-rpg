<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Jogador - RPG Platform</title>
  <style>
    .player-layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 1rem;
      min-height: calc(100vh - 80px);
    }

    .sheet-section {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--color-bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 2px solid var(--color-accent-gold);
    }

    .char-info h3 {
      margin: 0;
      font-size: 1.25rem;
    }

    .char-info p {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 0.9rem;
    }

    .resource-bar {
      margin-bottom: 0.75rem;
    }

    .resource-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
    }

    .bar-container {
      height: 20px;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }

    .bar-fill.hp {
      background: linear-gradient(90deg, #dc2626, #ef4444);
    }

    .bar-fill.mana {
      background: linear-gradient(90deg, #2563eb, #3b82f6);
    }

    .bar-fill.stamina {
      background: linear-gradient(90deg, #16a34a, #22c55e);
    }

    .status-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      background: rgba(220, 38, 38, 0.2);
      border-radius: 9999px;
      font-size: 0.75rem;
      color: var(--color-accent-red);
    }

    .status-badge.buff {
      background: rgba(22, 163, 74, 0.2);
      color: var(--color-accent-green);
    }

    .ability-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .ability-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .ability-item:hover {
      background: var(--color-bg-tertiary);
      transform: translateX(5px);
    }

    .ability-name {
      font-weight: 500;
    }

    .ability-dice {
      color: var(--color-accent-gold);
      font-weight: 600;
    }

    .ability-cost {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    .grimoire-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .grimoire-card {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      border-left: 3px solid var(--color-accent-gold);
    }

    .grimoire-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .grimoire-card-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .grimoire-card-type {
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--color-bg-tertiary);
    }

    .grimoire-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }

    .grimoire-tag {
      font-size: 0.65rem;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      background: rgba(212, 175, 55, 0.2);
      color: var(--color-accent-gold);
    }

    .grimoire-tag.dano { background: rgba(220, 38, 38, 0.2); color: #ef4444; }
    .grimoire-tag.cura { background: rgba(22, 163, 74, 0.2); color: #22c55e; }
    .grimoire-tag.controle { background: rgba(147, 51, 234, 0.2); color: #a855f7; }
    .grimoire-tag.suporte { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .grimoire-tag.truque { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
    .grimoire-tag.passiva { background: rgba(212, 175, 55, 0.2); color: #fbbf24; }

    .grimoire-desc {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .grimoire-use-btn {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
    }

    .map-viewer {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(212, 175, 55, 0.2);
      width: 800px;
      height: 600px;
      max-width: 100%;
      position: relative;
      overflow: hidden;
      margin: 0 auto;
    }

    .map-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--color-text-muted);
      text-align: center;
    }

    .map-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .map-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
    }

    .tokens-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .map-token {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9rem;
      pointer-events: none;
    }

    .map-token.player {
      border-color: #d4af37 !important;
      background-color: rgba(212, 175, 55, 0.3) !important;
    }

    .map-token.enemy {
      border-color: #dc2626 !important;
      background-color: rgba(220, 38, 38, 0.3) !important;
    }

    .map-token.npc {
      border-color: #3b82f6 !important;
      background-color: rgba(59, 130, 246, 0.3) !important;
    }

    .map-token.object {
      border-color: #6b7280 !important;
      background-color: rgba(107, 114, 128, 0.3) !important;
    }

    .token-name {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.7);
      padding: 1px 4px;
      border-radius: 2px;
      color: white;
    }

    .map-token.hidden {
      opacity: 0.2;
    }

    .chat-container {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(212, 175, 55, 0.2);
      height: 280px;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
    }

    .chat-input-area {
      padding: 0.75rem;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      display: flex;
      gap: 0.5rem;
    }

    .message {
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .message:last-child {
      border-bottom: none;
    }

    .message-sender {
      font-weight: 600;
      color: var(--color-accent-gold);
    }

    .message-roll {
      background: rgba(212, 175, 55, 0.1);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      display: inline-block;
    }

    .message-system {
      color: var(--color-accent-purple);
      font-style: italic;
    }

    .message-battle {
      color: var(--color-accent-red);
      border-left: 2px solid var(--color-accent-red);
      padding-left: 0.5rem;
    }

    .dice-quick-panel {
      display: flex;
      gap: 0.25rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: 0.5rem;
    }

    .dice-result {
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--color-accent-gold);
      min-height: 2rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .tab {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: var(--radius-md);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .tab:hover {
      border-color: var(--color-accent-gold);
    }

    .tab.active {
      background: var(--color-accent-gold);
      border-color: var(--color-accent-gold);
      color: var(--color-bg-primary);
    }

    .battle-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-accent-red);
      color: white;
      padding: 0.5rem 2rem;
      border-radius: var(--radius-md);
      font-weight: bold;
      z-index: 100;
      display: none;
      animation: pulse-red 1s infinite;
    }

    .battle-indicator.active {
      display: block;
    }

    @keyframes pulse-red {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5);
      }

      50% {
        box-shadow: 0 0 0 10px rgba(220, 38, 38, 0);
      }
    }

    .turn-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid var(--color-accent-gold);
      padding: 0.5rem 1.5rem;
      border-radius: var(--radius-md);
      z-index: 99;
      display: none;
    }

    .turn-indicator.active {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .turn-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .round-badge {
      background: var(--color-accent-gold);
      color: var(--color-bg-primary);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: bold;
      font-size: 0.85rem;
    }

    .your-turn {
      background: var(--color-accent-green) !important;
      animation: glow-green 1s infinite;
    }

    @keyframes glow-green {

      0%,
      100% {
        box-shadow: 0 0 5px rgba(22, 163, 74, 0.5);
      }

      50% {
        box-shadow: 0 0 20px rgba(22, 163, 74, 0.8);
      }
    }

    .battle-mode .chat-container {
      border-color: var(--color-accent-red);
    }

    @media (max-width: 900px) {
      .player-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/player-Boi_wL7J.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/sounds-D8zRJubN.js">
  <link rel="modulepreload" crossorigin href="/assets/dice-DwlbI5xZ.js">
  <link rel="modulepreload" crossorigin href="/assets/battle-DUIPPOcc.js">
  <link rel="stylesheet" crossorigin href="/assets/sounds-CCMRs7ij.css">
  <link rel="stylesheet" crossorigin href="/assets/battle-Bs8EsFhE.css">
</head>

<body class="page battle-mode">
  <div class="turn-indicator" id="turnIndicator"></div>
  <div class="battle-indicator" id="battleIndicator">⚔️ MODO BATALHA - Sua Vez!</div>

  <header
    style="background: var(--color-bg-secondary); padding: 1rem 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2);">
    <div class="container">
      <div class="flex flex-between flex-center">
        <h1 style="font-size: 1.25rem; margin: 0;">🏰 RPG Platform</h1>
        <div class="flex gap-md flex-center">
          <span class="badge badge-gold" id="roomCode">-----</span>
          <button class="btn btn-secondary btn-sm" id="soundToggle">🔊</button>
          <button class="btn btn-danger btn-sm" id="leaveBtn">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="player-layout">
        <aside class="character-sheet">
          <div class="sheet-section">
            <div class="sheet-header">
              <div class="avatar" id="charAvatar">?</div>
              <div class="char-info">
                <h3 id="charName">Carregando...</h3>
                <p id="charClass">---</p>
              </div>
            </div>

            <div class="resource-bar">
              <div class="resource-label">
                <span>❤️ HP</span>
                <span id="hpText">0 / 0</span>
              </div>
              <div class="bar-container">
                <div class="bar-fill hp" id="hpBar" style="width: 0%"></div>
              </div>
            </div>

            <div class="status-badges" id="statusBadges"></div>
            </div>

          <div class="tabs">
            <button class="tab active" data-tab="general">👤 Geral</button>
            <button class="tab" data-tab="abilities">⚔️ Habilidades</button>
            <button class="tab" data-tab="grimoire">📖 Grimório</button>
            <button class="tab" data-tab="items">🎒 Itens</button>
          </div>

          <div class="sheet-section">
            <div id="generalTab" class="tab-content"></div>
            <div id="abilitiesTab" class="tab-content hidden"></div>
            <div id="grimoireTab" class="tab-content hidden"></div>
            <div id="itemsTab" class="tab-content hidden"></div>
          </div>
        </aside>

        <section class="main-area">
          <div id="allPlayerCards" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;"></div>
          <div id="endTurnWrapper" style="display:none;margin-bottom:8px;text-align:center;">
            <button id="endTurnBtn" class="btn btn-warning" style="background:#f59e0b;color:#1a1208;border:none;padding:8px 24px;border-radius:6px;font-weight:bold;font-size:0.95rem;cursor:pointer;">
              ⏭️ Fim da Jogada — Passar a Vez
            </button>
          </div>
          <div class="map-viewer" id="mapViewer">
            <div id="mapWrapper" class="map-wrapper">
              <img id="mapImage" class="map-image" style="display: none;">
              <div id="tokensLayer" class="tokens-layer"></div>
              <div class="map-placeholder" id="mapPlaceholder">
                <p style="font-size: 3rem; margin-bottom: 1rem;">🗺️</p>
                <p>Mapa da Mesa</p>
              </div>
            </div>
          </div>

          <div class="chat-container mt-md">
            <div class="panel" style="background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:0.5rem;">
              <h3 class="panel-title" style="font-size:0.8rem;">&#x1F3B2; Dados Rápidos</h3>
              <div class="dice-quick-panel">
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d4">d4</button>
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d6">d6</button>
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d8">d8</button>
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d10">d10</button>
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d12">d12</button>
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d20">d20</button>
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="2d6">2d6</button>
                <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d100">d100</button>
              </div>
              <div class="dice-result" id="diceResult">-</div>
              <input type="text" id="customDiceInput" class="input" placeholder="Ex: 2d12+3" style="margin-top:4px;font-size:0.8rem;">
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <form class="chat-input-area" id="chatForm">
              <input type="text" id="chatInput" class="input" placeholder="Conectando..." autocomplete="off" disabled>
              <button type="submit" class="btn btn-primary" id="chatSendBtn" disabled>Enviar</button>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

</body>

</html>
