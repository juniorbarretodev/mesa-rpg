<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala de Espera - RPG Platform</title>
  <script type="module" crossorigin src="/assets/lobby-FCoV2czz.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/sounds-vUoiWWks.js">
  <link rel="modulepreload" crossorigin href="/assets/dice-DtlRVfWd.js">
  <link rel="stylesheet" crossorigin href="/assets/sounds-9glUlBov.css">
</head>
<body class="page">
  <header class="main-header" style="background: var(--color-bg-secondary); padding: 1rem 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2);">
    <div class="container">
      <div class="flex flex-between flex-center">
        <h1 style="font-size: 1.5rem; margin: 0;">🏰 <span id="roomName">Carregando...</span></h1>
        <div class="flex gap-md">
          <span class="badge badge-gold">Código: <strong id="roomCode">-----</strong></span>
          <button class="btn btn-secondary btn-sm" id="copyCodeBtn">Copiar Código</button>
          <button class="btn btn-danger btn-sm" id="leaveBtn">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="lobby-layout">
        <div class="lobby-main">
          <div class="panel">
            <div class="panel-header">
              <h2 class="panel-title">🎮 Jogadores</h2>
              <span id="playerCount" class="badge badge-blue">0 jogadores</span>
            </div>
            <div id="playersList" class="players-list">
              <div class="loading">
                <div class="loading-spinner"></div>
                <span>Conectando...</span>
              </div>
            </div>
          </div>

          <div class="panel mt-md">
            <div class="panel-header">
              <h2 class="panel-title">💬 Chat</h2>
            </div>
            <div id="chatMessages" style="height: 300px; overflow-y: auto; padding: 1rem 0;">
              <p class="text-center text-muted">Aguardando mensagens...</p>
            </div>
            <form id="chatForm" class="flex gap-sm">
              <input type="text" id="chatInput" class="input" placeholder="Digite sua mensagem..." autocomplete="off">
              <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
          </div>
        </div>

        <div class="lobby-sidebar">
          <div id="masterActions" class="panel hidden">
            <h3 class="panel-title mb-md">🎭 Ações do Mestre</h3>
            <button class="btn btn-success btn-block mb-sm" id="startSessionBtn">
              ▶️ Iniciar Sessão
            </button>
            <button class="btn btn-secondary btn-block" id="testSoundBtn">
              🔊 Testar Som
            </button>
          </div>

          <div class="panel">
            <h3 class="panel-title mb-md">📋 Status</h3>
            <div class="flex flex-col gap-sm">
              <div class="flex flex-between">
                <span class="text-muted">Sua função:</span>
                <span id="yourRole" class="badge badge-purple">---</span>
              </div>
              <div class="flex flex-between">
                <span class="text-muted">Status:</span>
                <span id="roomStatus" class="badge badge-gold">Aguardando</span>
              </div>
            </div>
          </div>

          <div class="panel">
            <h3 class="panel-title mb-md">🎲 Dados Rápidos</h3>
            <div class="flex gap-sm flex-wrap">
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d4">1d4</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d6">1d6</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d8">1d8</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d10">1d10</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d12">1d12</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d20">1d20</button>
            </div>
            <div id="diceResult" class="mt-md text-center" style="font-size: 1.5rem; min-height: 2rem;"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
