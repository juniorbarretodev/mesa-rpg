<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Mestre - RPG Platform</title>
  <style>
    .master-layout {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 1rem;
      min-height: calc(100vh - 80px);
    }

    .sidebar-left, .sidebar-right {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .battle-indicator {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-accent-red);
      color: white;
      padding: 0.5rem 2rem;
      border-radius: var(--radius-md);
      font-weight: bold;
      z-index: 100;
      display: none;
    }

    .battle-indicator.active {
      display: block;
      animation: pulse-red 1s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
      50% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
    }

    .dice-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
    }

    .dice-display {
      font-size: 2rem;
      font-weight: bold;
      min-width: 60px;
      text-align: center;
      color: var(--color-accent-gold);
    }

    .dice-rolling {
      animation: shake 0.1s infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-5deg); }
      75% { transform: translateX(5px) rotate(5deg); }
    }

    .dice-buttons {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .tokens-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      min-height: 60px;
    }

    .npc-template {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-tertiary);
      border-radius: var(--radius-sm);
      cursor: grab;
      font-size: 0.85rem;
      transition: all var(--transition-fast);
    }

    .npc-template:hover {
      background: var(--color-bg-secondary);
      transform: scale(1.05);
    }

    .npc-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .npc-hp {
      color: var(--color-text-muted);
      font-size: 0.75rem;
    }

    .map-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .map-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
    }

    .map-drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .map-wrapper:hover .map-drawing-canvas {
      pointer-events: auto;
    }

    .tokens-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .map-token {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: grab;
      pointer-events: auto;
      transition: transform 0.1s;
      z-index: 10;
    }

    .map-token span {
      font-size: 1.25rem;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .map-token.enemy {
      border-color: #dc2626 !important;
      background-color: rgba(220, 38, 38, 0.3) !important;
    }

    .map-token.npc {
      border-color: #3b82f6 !important;
      background-color: rgba(59, 130, 246, 0.3) !important;
    }

    .map-token.object {
      border-color: #6b7280 !important;
      background-color: rgba(107, 114, 128, 0.3) !important;
    }

    .map-token.player {
      border-color: #d4af37 !important;
      background-color: rgba(212, 175, 55, 0.3) !important;
    }

    .token-name {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      white-space: nowrap;
      background: rgba(0,0,0,0.7);
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
    }

    .map-drop-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-secondary);
      border: 2px dashed rgba(212, 175, 55, 0.3);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .map-drop-zone:hover, .map-drop-zone.drag-over {
      border-color: var(--color-accent-gold);
      background: rgba(212, 175, 55, 0.1);
    }

    .drag-over {
      background: rgba(212, 175, 55, 0.2) !important;
    }

    #mapDropZone { cursor: default; pointer-events: none; }
    #mapDropZone canvas, #mapDropZone .map-token { pointer-events: all; }

    .master-sheet-card {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .master-sheet-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .master-sheet-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-accent-gold);
      color: var(--color-bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .master-sheet-info h4 {
      margin: 0;
      font-size: 0.9rem;
    }

    .master-sheet-info span {
      font-size: 0.75rem;
    }

    .hp-control {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .hp-display {
      flex: 1;
      text-align: center;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .hp-bar {
      height: 6px;
      background: var(--color-bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }

    .hp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #dc2626, #ef4444);
      transition: width 0.3s;
    }

    .turn-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      border: 2px solid var(--color-accent-gold);
      padding: 0.5rem 1.5rem;
      border-radius: var(--radius-md);
      z-index: 99;
      display: none;
    }

    .turn-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .round-badge {
      background: var(--color-accent-gold);
      color: var(--color-bg-primary);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: bold;
      font-size: 0.85rem;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--color-bg-card);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
    }

    .modal-content h3 {
      margin-top: 0;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }

    .form-row {
      display: flex;
      gap: 1rem;
    }

    .form-row .form-group {
      flex: 1;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .status-checkbox {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .status-checkbox:hover {
      background: var(--color-bg-tertiary);
    }

    .battle-mode .chat-container {
      border-color: var(--color-accent-red);
    }

    @media (max-width: 1200px) {
      .master-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/master-Dtp7usZj.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/sounds-D8zRJubN.js">
  <link rel="modulepreload" crossorigin href="/assets/dice-DwlbI5xZ.js">
  <link rel="modulepreload" crossorigin href="/assets/battle-BOJcdewg.js">
  <link rel="stylesheet" crossorigin href="/assets/sounds-CCMRs7ij.css">
  <link rel="stylesheet" crossorigin href="/assets/battle-Bs8EsFhE.css">
</head>
<body class="page battle-mode">
  <div class="turn-indicator" id="turnIndicator"></div>
  <div class="battle-indicator" id="battleIndicator">⚔️ MODO BATALHA</div>

  <header style="background: var(--color-bg-secondary); padding: 1rem 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2);">
    <div class="container">
      <div class="flex flex-between flex-center">
        <div class="flex gap-md flex-center">
          <h1 style="font-size: 1.25rem; margin: 0;">🎭 <span id="masterNick">Mestre</span></h1>
          <span class="badge badge-gold" id="roomName">Mesa</span>
        </div>
        <div class="flex gap-md">
          <button class="btn btn-success btn-sm" id="toggleBattleBtn">⚔️ Ativar Batalha</button>
          <button class="btn btn-warning btn-sm" id="finalizeInitBtn" style="display:none;background:#ca8a04;color:white;border:none;">⏱️ Finalizar Iniciativa</button>
          <button class="btn btn-warning btn-sm" id="masterEndTurnBtn" style="display:none;background:#f59e0b;color:#1a1208;border:none;">⏭️ Fim de Turno</button>
          <button class="btn btn-danger btn-sm" id="endSessionBtn">Encerrar</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="master-layout">
        <aside class="sidebar-left">
          <div class="panel">
            <h3 class="panel-title">🎲 Dados Rápidos</h3>
            <div class="dice-container mb-md">
              <div class="dice-display" id="diceDisplay">-</div>
            </div>
            <div class="dice-buttons mb-md">
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d4">d4</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d6">d6</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d8">d8</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d10">d10</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d12">d12</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d20">d20</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="2d6">2d6</button>
              <button class="btn btn-secondary btn-sm dice-btn" data-dice="1d100">d100</button>
            </div>
            <input type="text" class="input mb-sm" id="customDiceInput" placeholder="Ex: 2d6+3">
            <button class="btn btn-primary btn-block" id="rollCustomBtn">Rolar</button>
          </div>

          <div class="panel">
            <h3 class="panel-title">📜 Histórico</h3>
            <div id="rollHistory" style="max-height: 150px; overflow-y: auto;"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🗺️ Mapa</h3>
            <div class="flex gap-sm mb-sm">
              <button class="btn btn-secondary btn-sm" id="loadMapBtn">🗺 Carregar Mapa</button>
              <button class="btn btn-secondary btn-sm" id="toggleGridBtn">🔲 Grid</button>
            </div>
          </div>

          <div class="panel">
            <h3 class="panel-title">⚔️ NPCs</h3>
            <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;">
              <button onclick="MasterSystem.openNpcModal('hostile')" class="btn btn-sm" style="background:#dc2626;color:white;border:none;">+ Hostil</button>
              <button onclick="MasterSystem.openNpcModal('neutral')" class="btn btn-sm" style="background:#ca8a04;color:white;border:none;">+ Neutro</button>
              <button onclick="MasterSystem.openNpcModal('friendly')" class="btn btn-sm" style="background:#16a34a;color:white;border:none;">+ Amigável</button>
            </div>
            <div id="npcCardsContainer" style="display:flex;gap:8px;flex-wrap:wrap;padding:4px 0;min-height:40px;"></div>
          </div>
        </aside>

        <section class="main-area">
          <div id="mapContainer" style="width:800px; height:600px; max-width:100%; border-radius: var(--radius-lg); overflow: hidden; margin: 0 auto;">
            <!-- O MapSystem irá preencher o HTML aqui automaticamente -->
          </div>

          <div class="panel mt-md chat-container">
            <h3 class="panel-title">💬 Chat</h3>
            <div class="chat-messages" id="chatMessages" style="height: 200px; overflow-y: auto; padding: 0.5rem; background: var(--color-bg-secondary); border-radius: var(--radius-md);"></div>
            <form id="chatForm" class="flex gap-sm mt-md">
               <input type="text" id="chatInput" class="input" placeholder="Conectando..." autocomplete="off" disabled>
               <button type="submit" class="btn btn-primary" id="chatSendBtn" disabled>Enviar</button>
             </form>
          </div>
        </section>

        <aside class="sidebar-right">
          <div class="panel">
            <h3 class="panel-title">👥 Jogadores</h3>
            <div id="playersList" class="players-list"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🪙 Fichas dos Jogadores</h3>
            <div id="masterPlayerSheets"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🎭 Tokens</h3>
            <div id="tokensList" class="tokens-panel"></div>
          </div>

          <div class="panel">
            <h3 class="panel-title">🖌️ Ferramentas</h3>
            <div id="drawToolbar" style="display:flex;align-items:center;gap:6px;padding:6px;
              background:#1a1208;border:1px solid #8a6a1a;border-radius:4px;flex-wrap:wrap;">
              <span style="font-family:'Cinzel',serif;font-size:0.5rem;color:#8a6a1a;letter-spacing:1px;">DESENHO</span>

              <button id="btnPen" onclick="DrawSystem.setTool('pen')"
                title="Caneta"
                style="width:30px;height:30px;background:#1a1208;border:1px solid #8a6a1a;
                  color:#c9a84c;border-radius:4px;cursor:pointer;font-size:1rem;">✏️</button>

              <button id="btnEraser" onclick="DrawSystem.setTool('eraser')"
                title="Borracha"
                style="width:30px;height:30px;background:#1a1208;border:1px solid #8a6a1a;
                  color:#c9a84c;border-radius:4px;cursor:pointer;font-size:1rem;">🧹</button>

              <input type="color" id="drawColor" value="#e74c3c"
                title="Cor"
                style="width:30px;height:30px;padding:0;border:1px solid #8a6a1a;
                  border-radius:4px;cursor:pointer;background:none;">

              <input type="range" id="drawSize" min="2" max="30" value="4"
                title="Espessura"
                style="width:60px;accent-color:#c9a84c;">

              <button id="btnClearDraw" onclick="DrawSystem.clear()"
                title="Limpar desenho"
                style="width:30px;height:30px;background:#1a1208;border:1px solid #8b1a1a;
                  color:#e74c3c;border-radius:4px;cursor:pointer;font-size:0.9rem;">🗑</button>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

</body>
</html>
